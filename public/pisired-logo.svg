<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Icon: Rounded emerald square -->
  <rect x="2" y="4" width="40" height="40" rx="9" fill="#10b981"/>
  <!-- P stem -->
  <rect x="13" y="12" width="6" height="24" rx="1.5" fill="white"/>
  <!-- P bowl: semicircle facing right -->
  <path d="M19 12 A8 8 0 0 1 19 28 L19 12 Z" fill="white"/>
  <!-- Accent dot -->
  <circle cx="36" cy="10" r="2.5" fill="white" opacity="0.35"/>
  <!-- Wordmark: "Pis" in dark then "ired" in emerald -->
  <text x="55" y="33"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="700" fill="#0f172a">Pis</text>
  <text x="97" y="33"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="700" fill="#10b981">ired</text>
</svg>
